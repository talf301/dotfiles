# Reference: https://github.com/i3/i3/blob/next/etc/config

# i3 doesn't have "normalizations" feature that why we disable them here.
# But the feature is very helpful.
# Normalizations eliminate all sorts of weird tree configurations that don't make sense.
# Give normalizations a chance and enable them back.
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

# Run things alongside aerospace:
after-startup-command = ['exec-and-forget sketchybar',
                         'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=10.0 hidpi=true']

start-at-login = true

# Notify Sketchybar about workspace change
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE && ~/.config/sketchybar/plugins/update_workspace_icons.sh'
]

[gaps]
    inner.horizontal = 10
    inner.vertical = 10
    outer.left = 10
    outer.right = 10
    outer.bottom = 10
    outer.top = [
        { monitor."built-in" = 10  },
        { monitor."main" = 40  },
        40
    ]

[mode.main.binding]
    # See: https://nikitabobko.github.io/AeroSpace/goodies#open-a-new-window-with-applescript
    alt-cmd-ctrl-enter = 'exec-and-forget open -n -a Alacritty'

    # i3 wraps focus by default
    alt-cmd-ctrl-h =         'focus --boundaries-action wrap-around-the-workspace left'
    alt-cmd-ctrl-j =         'focus --boundaries-action wrap-around-the-workspace down'
    alt-cmd-ctrl-k =         'focus --boundaries-action wrap-around-the-workspace up'
    alt-cmd-ctrl-l =         'focus --boundaries-action wrap-around-the-workspace right'

    alt-cmd-ctrl-shift-h = 'move left'
    alt-cmd-ctrl-shift-j = 'move down'
    alt-cmd-ctrl-shift-k = 'move up'
    alt-cmd-ctrl-shift-l = 'move right'

    # Consider using 'join-with' command as a 'split' replacement if you want to enable
    # normalizations
    alt-cmd-ctrl-b = 'split horizontal'
    alt-cmd-ctrl-v = 'split vertical'

    alt-cmd-ctrl-f = 'fullscreen'

    alt-s = 'layout v_accordion' # 'layout stacking' in i3
    alt-w = 'layout h_accordion' # 'layout tabbed' in i3
    alt-e = 'layout tiles horizontal vertical' # 'layout toggle split' in i3

    alt-shift-space = 'layout floating tiling' # 'floating toggle' in i3

    # Not supported, because this command is redundant in AeroSpace mental model.
    # See: https://nikitabobko.github.io/AeroSpace/guide#floating-windows
    #alt-space = 'focus toggle_tiling_floating'

    # `focus parent`/`focus child` are not yet supported, and it's not clear whether they
    # should be supported at all https://github.com/nikitabobko/AeroSpace/issues/5
    # alt-a = 'focus parent'

    alt-cmd-ctrl-1 = 'workspace 1'
    alt-cmd-ctrl-2 = 'workspace 2'
    alt-cmd-ctrl-3 = 'workspace 3'
    alt-cmd-ctrl-4 = 'workspace 4'
    alt-cmd-ctrl-5 = 'workspace 5'
    alt-cmd-ctrl-6 = 'workspace 6'
    alt-cmd-ctrl-7 = 'workspace 7'
    alt-cmd-ctrl-8 = 'workspace 8'
    alt-cmd-ctrl-9 = 'workspace 9'

    alt-cmd-ctrl-shift-1 = 'move-node-to-workspace 1'
    alt-cmd-ctrl-shift-2 = 'move-node-to-workspace 2'
    alt-cmd-ctrl-shift-3 = 'move-node-to-workspace 3'
    alt-cmd-ctrl-shift-4 = 'move-node-to-workspace 4'
    alt-cmd-ctrl-shift-5 = 'move-node-to-workspace 5'
    alt-cmd-ctrl-shift-6 = 'move-node-to-workspace 6'
    alt-cmd-ctrl-shift-7 = 'move-node-to-workspace 7'
    alt-cmd-ctrl-shift-8 = 'move-node-to-workspace 8'
    alt-cmd-ctrl-shift-9 = 'move-node-to-workspace 9'

    alt-cmd-ctrl-shift-c = 'reload-config'

    alt-cmd-ctrl-a = 'focus-monitor --wrap-around next'

    alt-cmd-ctrl-r = 'mode resize'


[mode.resize.binding]
    h = 'resize width -50'
    j = 'resize height +50'
    k = 'resize height -50'
    l = 'resize width +50'
    enter = 'mode main'
    esc = 'mode main'

[workspace-to-monitor-force-assignment]
    1 = 'main'
    2 = 'main'
    3 = 'main'
    4 = 'main'
    5 = 'main'
    6 = 'main'
    7 = 'secondary'
    8 = 'secondary'
    9 = 'secondary'